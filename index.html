<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>Product Management System</h1>
    </header>

    <main class="app-main">
        <div class="admin-layout">
            <!-- Form Section (Top-Left) -->
            <div class="admin-form-wrapper">
                <div class="admin-form-card">
                    <h4 id="formTitle">Add New Product</h4>
                    <form id="productForm">
                        <input type="hidden" id="editProductId" value="">
                        <div class="form-group">
                            <label for="adminProductName">Product Name</label>
                            <input type="text" id="adminProductName" placeholder="Enter product name" required>
                        </div>
                        <div class="form-group">
                            <label for="adminProductDesc">Product Description</label>
                            <textarea id="adminProductDesc" rows="4" placeholder="Enter detailed description" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="adminProductPrice">Product Price (PKR)</label>
                            <div class="price-input-wrapper">
                                <span class="price-prefix">PKR</span>
                                <input type="number" id="adminProductPrice" placeholder="0.00" min="0" step="0.01" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="adminProductImages">Product Images (Max 3)</label>
                            <input type="file" id="adminProductImages" accept="image/*" multiple>
                            <small class="form-help">Select up to 3 images.</small>
                        </div>
                        <button type="submit" class="btn-primary w-100" id="adminSubmitBtn">Add New Product</button>
                    </form>
                </div>
            </div>

            <!-- Cards Section (Grid on Right) -->
            <div class="admin-cards-wrapper">
                <div class="admin-cards-grid" id="adminProductsGrid">
                    <!-- Dynamic cards will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <!-- ── Edit Product Modal ─────────────────────────────────────────────── -->
    <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-header-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </div>
                <h3 id="modalTitle">Edit Product</h3>
                <button class="modal-close-btn" id="modalCloseBtn" title="Close" aria-label="Close modal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <form id="editProductForm" novalidate>
                <input type="hidden" id="modalProductId">
                <div class="form-group">
                    <label for="modalProductName">Product Name</label>
                    <input type="text" id="modalProductName" placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label for="modalProductDesc">Product Description</label>
                    <textarea id="modalProductDesc" rows="3" placeholder="Enter detailed description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="modalProductPrice">Product Price (PKR)</label>
                    <div class="price-input-wrapper">
                        <span class="price-prefix">PKR</span>
                        <input type="number" id="modalProductPrice" placeholder="0.00" min="0" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="modalProductImages">Replace Images (Max 3)</label>
                    <input type="file" id="modalProductImages" accept="image/*" multiple>
                    <small class="form-help">Leave empty to keep existing images.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="modalCancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" id="modalSubmitBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Update Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Delete Confirmation Modal ────────────────────────────────────── -->
    <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="modal-card modal-confirm">
            <div class="modal-header">
                <div class="modal-header-icon delete-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </div>
                <h3 id="deleteModalTitle">Delete Product?</h3>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this product? This action cannot be undone and all data will be permanently removed.</p>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="deleteCancelBtn">Keep Product</button>
                <button type="button" class="btn-primary btn-danger" id="confirmDeleteBtn">Delete Now</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
